<body>
<div class="header">

</div>
<div class="progress-rings" id="progressRings"></div>
<div class="toolbar">

    <button class="tab-btn" onclick="switchProject('nz',this)">🇳🇿 新西兰</button>
    <button class="tab-btn" onclick="switchProject('ybyh',this)">🇮🇹🇵🇱🇬🇧🇳🇱 意波英荷</button>

    <button class="tab-btn" onclick="switchProject('il',this)">🇮🇱 以色列</button>
    <span class="sep"></span>
    <select class="filter-select" id="filterOwner" onchange="applyFilters()"><option value="">👤 全部负责人</option></select>
    <select class="filter-select" id="filterPriority" onchange="applyFilters()">
        <option value="">🏷️ 全部优先级</option><option value="P0">P0 最高</option><option value="P1">P1 高</option><option value="P2">P2 中</option>
    </select>

    <span class="sep"></span>
    <button class="icon-btn" id="cpBtn" onclick="toggleCriticalPath()">🔴 关键路径</button>
    <button class="icon-btn" onclick="exportPNG()">📥 导出PNG</button>
    <button class="icon-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
</div>
<div class="legend">

    <div class="legend-item"><div class="legend-color" style="background:#ff6f00;width:3px;height:14px"></div>里程碑</div>

</div>
<div style="display:flex;justify-content:center;gap:12px;margin:0 16px 8px;flex-wrap:wrap">

        <button class="todo-toggle-btn" onclick="toggleTodo()">📋 今日待办提醒 <span class="badge" id="todoBadge">0</span></button>
    </div>
    <div class="update-toggle">
        <button class="update-toggle-btn" onclick="toggleUpdatePanel()">✏️ 更新任务状态</button>
    </div>
    <div>
        <button class="report-toggle-btn" onclick="toggleReport()">📝 生成周报</button>
    </div>
</div>
<div class="update-panel" id="updatePanel">
    <div class="update-header"><span>✏️ 任务状态更新</span><span style="font-size:11px;opacity:.8">修改后自动保存并刷新图表</span></div>
    <div class="update-proj-tabs" id="updateProjTabs"></div>
    <div class="save-hint" id="saveHint">✅ 已更新！图表已刷新</div>
    <div class="update-list" id="updateList"></div>
</div>
<div class="report-panel" id="reportPanel">
    <div class="report-header"><span>📝 项目进展周报</span><div><button onclick="copyReport()">📋 复制文本</button> <button onclick="copyReportMarkdown()">📄 复制Markdown</button></div></div>

</div>
<div class="copy-toast" id="copyToast">✅ 已复制到剪贴板</div>

<div class="todo-panel" id="todoPanel"></div>

// ========== GLOBALS ==========

// ========== 2. PROGRESS RINGS ==========
function renderProgressRings() {
    let html = "";
    for (const [k, proj] of Object.entries(PROJECTS)) {
        const tasks = proj.tasks.filter(t => t.task && t.start && t.end);
        const done = tasks.filter(t => t.status === "done").length;
        const prog = tasks.filter(t => t.status === "progress").length;
        const todo = tasks.filter(t => t.status === "todo").length;
        const total = tasks.length;
        const pct = total ? Math.round(((done + prog * 0.5) / total) * 100) : 0;
        const r = 20, c = 2 * Math.PI * r;
        const doneArc = (done / total) * c;
        const progArc = (prog / total) * c;
        const todoArc = c - doneArc - progArc;
        const shortName = { nz: "🇳🇿 新西兰", ybyh: "🇮🇹 意波英荷", cl: "🇨🇱 智利", il: "🇮🇱 以色列" }[k];
        html += `<div class="ring-card">
            <svg class="ring-svg" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="${r}" fill="none" stroke="#e0e0e0" stroke-width="5"/>
                <circle cx="26" cy="26" r="${r}" fill="none" stroke="#43a047" stroke-width="5"
                    stroke-dasharray="${doneArc} ${c - doneArc}" stroke-dashoffset="0" transform="rotate(-90 26 26)"/>
                <circle cx="26" cy="26" r="${r}" fill="none" stroke="#fb8c00" stroke-width="5"
                    stroke-dasharray="${progArc} ${c - progArc}" stroke-dashoffset="${-doneArc}" transform="rotate(-90 26 26)"/>
                <text x="26" y="29" text-anchor="middle" font-size="11" font-weight="800" fill="${proj.color}">${pct}%</text>
            </svg>
            <div><div class="ring-label" style="color:${proj.color}">${shortName}</div>
            <div class="ring-stats">✅${done} 🔄${prog} ⏳${todo} / ${total}项</div></div>
        </div>`;
    }
    document.getElementById("progressRings").innerHTML = html;
}

// ========== 3. OWNER FILTER INIT ==========
function initOwnerFilter() {
    const owners = new Set();
    for (const proj of Object.values(PROJECTS)) {
        proj.tasks.forEach(t => {
            if (t.owner) t.owner.split("/").forEach(o => { const n = o.trim().replace(/\(.*\)/, ""); if (n) owners.add(n); });
        });
    }
    const sel = document.getElementById("filterOwner");
    [...owners].sort().forEach(o => { const opt = document.createElement("option"); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
}

// ========== 4. FILTERS ==========
function applyFilters() {
    filterOwner = document.getElementById("filterOwner").value;
    filterPriority = document.getElementById("filterPriority").value;
    searchText = document.getElementById("searchBox").value.trim().toLowerCase();
    render();
}

function matchesFilter(t) {
    if (t.status === "phase") return true;
    if (t.projHeader) return true;
    if (filterOwner && !(t.owner || "").includes(filterOwner)) return false;
    if (filterPriority && t.p !== filterPriority) return false;
    if (searchText && !(t.task || "").toLowerCase().includes(searchText) && !(t.owner || "").toLowerCase().includes(searchText)) return false;
    return true;
}

// ========== 5. CRITICAL PATH ==========
function toggleCriticalPath() {
    showCriticalPath = !showCriticalPath;
    document.getElementById("cpBtn").classList.toggle("active", showCriticalPath);
    render();
}
function isCritical(t) { return t.p === "P0" && t.status !== "done"; }

// ========== 6. DARK MODE ==========
function toggleDark() {

// ========== 8. PHASE COLLAPSE ==========
function getPhaseKey(projKey, phaseName) { return projKey + "::" + phaseName; }

// ========== 9. RISK DETECTION ==========
function isRisk(t) {
    if (t.status === "done" || t.status === "phase") return false;
    const endMs = new Date(t.end).getTime();
    const startMs = new Date(t.start).getTime();
    if (t.status === "todo" && startMs <= todayMs && endMs < todayMs) return true;
    if (t.status === "progress" && endMs < todayMs) return true;
    if (t.status === "todo" && startMs <= todayMs && (endMs - todayMs) / 86400000 <= 2) return true;
    return false;
}

// ========== GANTT RENDER ==========
function dayOff(ds) { return Math.ceil((new Date(ds) - TIME_START) / 86400000); }
function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function getRows(projKey) {
    let rows = [];
    const addProj = (k, proj) => {
        rows.push({ projHeader: true, name: proj.name, color: proj.color, deadline: proj.deadlineLabel + "前上线" });
        let currentPhase = null;
        for (const t of proj.tasks) {
            if (t.status === "phase") {
                currentPhase = t.phase;
                const pk = getPhaseKey(k, currentPhase);
                rows.push({ ...t, projColor: proj.color, phaseKey: pk, collapsible: true });
                continue;
            }
            if (!t.start || !t.end) continue;
            if (currentPhase && collapsedPhases[getPhaseKey(k, currentPhase)]) continue;
            if (!matchesFilter(t)) continue;
            rows.push({ ...t, projColor: proj.color });
        }
    };
    if (projKey === "all") {
        for (const [k, proj] of Object.entries(PROJECTS)) addProj(k, proj);
    } else {
        addProj(projKey, PROJECTS[projKey]);
    }
    return rows;
}

let rowRects = [];
const blinkPhase = { val: 1 };
let animFrame = 0;
function animateBlink() {
    animFrame++;
    blinkPhase.val = 0.4 + 0.6 * Math.abs(Math.sin(animFrame * 0.06));
    render();
    requestAnimationFrame(animateBlink);
}

function render() {
    const rows = getRows(currentProject);
    const canvasH = HDR_H + rows.length * ROW_H + 10;
    canvas.width = FULL_W * dpr; canvas.height = canvasH * dpr;
    canvas.style.width = FULL_W + "px"; canvas.style.height = canvasH + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const bg = isDark ? "#16213e" : "#fff";
    const textColor = isDark ? "#e0e0e0" : "#333";
    const hdrBg = isDark ? "#0f3460" : "#f8f9fa";
    const gridColor = isDark ? "#1a1a4e" : "#f3f3f3";
    const lineColor = isDark ? "#2a2a5e" : "#f0f0f0";

    ctx.fillStyle = bg; ctx.fillRect(0, 0, FULL_W, canvasH);
    ctx.fillStyle = hdrBg; ctx.fillRect(0, 0, FULL_W, HDR_H);
    ctx.strokeStyle = isDark ? "#333" : "#ddd"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, HDR_H); ctx.lineTo(FULL_W, HDR_H); ctx.stroke();

    ctx.fillStyle = isDark ? "#aaa" : "#555"; ctx.font = "bold 11px -apple-system,'PingFang SC',sans-serif"; ctx.textAlign = "left";
    ctx.fillText("任务名称", 14, 20); ctx.fillText("优先级", 280, 20); ctx.fillText("负责人", 330, 20); ctx.fillText("状态", 405, 20);

    let curMonth = -1;
    const mNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    for (let d = 0; d < totalDays; d++) {
        const date = new Date(TIME_START.getTime() + d * 86400000);
        const m = date.getMonth(), dom = date.getDate(), dow = date.getDay();
        const x = LEFT_W + d * DAY_W;
        if (m !== curMonth) { curMonth = m; ctx.fillStyle = "#1a73e8"; ctx.font = "bold 11px -apple-system,sans-serif"; ctx.textAlign = "left"; ctx.fillText(mNames[m], x + 3, 16); }
        if (dom % 5 === 1) { ctx.fillStyle = isDark ? "#666" : "#aaa"; ctx.font = "9px -apple-system,sans-serif"; ctx.textAlign = "center"; ctx.fillText(dom, x + DAY_W / 2, 36); }
        if (dow === 0 || dow === 6) { ctx.fillStyle = isDark ? "rgba(255,255,255,.02)" : "rgba(0,0,0,.018)"; ctx.fillRect(x, HDR_H, DAY_W, canvasH - HDR_H); }
        if (dow === 1) { ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(x, HDR_H); ctx.lineTo(x, canvasH); ctx.stroke(); }
    }

    // Milestones
    getVisibleMilestones().forEach(ms => {
        const mx = LEFT_W + dayOff(ms.date) * DAY_W;
        ctx.strokeStyle = ms.color; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
        ctx.beginPath(); ctx.moveTo(mx, HDR_H); ctx.lineTo(mx, canvasH); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = ms.color; roundRect(mx - 22, HDR_H - 13, 44, 13, 3); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 9px -apple-system,sans-serif"; ctx.textAlign = "center"; ctx.fillText(ms.label, mx, HDR_H - 3);
    });

    // Today
    const todayX = LEFT_W + dayOff(TODAY_STR) * DAY_W;
    ctx.strokeStyle = "#f44336"; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(todayX, HDR_H); ctx.lineTo(todayX, canvasH); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = "#f44336"; roundRect(todayX - 14, HDR_H - 13, 28, 13, 3); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 8px -apple-system,sans-serif"; ctx.textAlign = "center"; ctx.fillText("今日", todayX, HDR_H - 3);

    // Rows
    rowRects = [];
    rows.forEach((row, i) => {
        const y = HDR_H + i * ROW_H;
        if (row.projHeader) {
            ctx.fillStyle = row.color; ctx.globalAlpha = isDark ? 0.2 : 0.1; ctx.fillRect(0, y, FULL_W, ROW_H); ctx.globalAlpha = 1;
            ctx.fillStyle = row.color; ctx.font = "bold 13px -apple-system,'PingFang SC',sans-serif"; ctx.textAlign = "left";
            ctx.fillText(row.name + "  (" + row.deadline + ")", 14, y + ROW_H / 2 + 5);
            ctx.strokeStyle = row.color; ctx.globalAlpha = 0.3; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(FULL_W, y + ROW_H); ctx.stroke(); ctx.globalAlpha = 1;
            return;
        }
        const isPhase = row.status === "phase";
        if (isPhase) { ctx.fillStyle = isDark ? "#1a2744" : "#e8f0fe"; ctx.fillRect(0, y, FULL_W, ROW_H); }
        ctx.strokeStyle = lineColor; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(FULL_W, y + ROW_H); ctx.stroke();

        // Name
        ctx.textAlign = "left";
        if (isPhase) {
            const collapsed = collapsedPhases[row.phaseKey];
            const arrow = collapsed ? "▶" : "▼";
            ctx.fillStyle = "#1a73e8"; ctx.font = "bold 12px -apple-system,'PingFang SC',sans-serif";
            ctx.fillText(arrow + " " + row.phase, 10, y + ROW_H / 2 + 4);
            rowRects.push({ x: 0, y, w: LEFT_W, h: ROW_H, type: "phase", phaseKey: row.phaseKey });
        } else {
            const risk = isRisk(row);
            const critical = showCriticalPath && isCritical(row);
            ctx.fillStyle = risk ? "#f44336" : (critical ? "#ff6f00" : (isDark ? "#ccc" : "#444"));
            ctx.font = (critical ? "bold " : "") + "11px -apple-system,'PingFang SC',sans-serif";
            const label = (row.task || "").length > 24 ? row.task.slice(0, 24) + ".." : row.task;
            ctx.fillText(label, 26, y + ROW_H / 2 + 4);
        }

        // Priority
        if (row.p) {
            const colors = { P0: { bg: "#fce4ec", fg: "#c62828" }, P1: { bg: "#fff3e0", fg: "#e65100" }, P2: { bg: "#e8f5e9", fg: "#2e7d32" } };
            const c = colors[row.p];
            if (c) { ctx.fillStyle = c.bg; roundRect(280, y + ROW_H / 2 - 7, 22, 14, 3); ctx.fill(); ctx.fillStyle = c.fg; ctx.font = "bold 9px -apple-system,sans-serif"; ctx.textAlign = "center"; ctx.fillText(row.p, 291, y + ROW_H / 2 + 3); ctx.textAlign = "left"; }
        }

        // Owner
        if (row.owner) { ctx.fillStyle = isDark ? "#aaa" : "#777"; ctx.font = "10px -apple-system,'PingFang SC',sans-serif"; const ot = row.owner.length > 8 ? row.owner.slice(0, 8) + ".." : row.owner; ctx.fillText(ot, 315, y + ROW_H / 2 + 4); }

        // Status
        if (!isPhase && row.status) {
            const sMap = { done: { bg: "#c8e6c9", fg: "#2e7d32", t: "已完成" }, progress: { bg: "#fff9c4", fg: "#f57f17", t: "进行中" }, todo: { bg: "#e0e0e0", fg: "#616161", t: "未开始" } };
            const s = sMap[row.status];
            if (s) { ctx.fillStyle = s.bg; roundRect(398, y + ROW_H / 2 - 7, 38, 14, 7); ctx.fill(); ctx.fillStyle = s.fg; ctx.font = "bold 9px -apple-system,'PingFang SC',sans-serif"; ctx.textAlign = "center"; ctx.fillText(s.t, 417, y + ROW_H / 2 + 3); ctx.textAlign = "left"; }
        }

        // Bar

            const s0 = dayOff(row.start), s1 = dayOff(row.end);
            const bx = LEFT_W + s0 * DAY_W, bw = Math.max((s1 - s0) * DAY_W, 5);
            const risk = isRisk(row);
            const critical = showCriticalPath && isCritical(row);

            if (isPhase) {
                const by = y + ROW_H / 2 + 2;
                const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
                g.addColorStop(0, row.projColor || "#5e35b1"); g.addColorStop(1, (row.projColor || "#5e35b1") + "99");
                ctx.fillStyle = g; roundRect(bx, by, bw, 5, 2.5); ctx.fill();
                ctx.fillStyle = row.projColor || "#5e35b1";
                [bx - 2, bx + bw - 2].forEach(dx => { ctx.beginPath(); ctx.moveTo(dx + 3, by + 2.5); ctx.lineTo(dx + 6, by - 1); ctx.lineTo(dx + 9, by + 2.5); ctx.lineTo(dx + 6, by + 7); ctx.closePath(); ctx.fill(); });
            } else {
                const by = y + 7, bh = ROW_H - 14;
                if (critical) { ctx.strokeStyle = "#ff6f00"; ctx.lineWidth = 2; roundRect(bx - 1, by - 1, bw + 2, bh + 2, 4); ctx.stroke(); }
                const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
                const cMap = { done: ["#43a047", "#66bb6a"], progress: ["#fb8c00", "#ffb74d"], todo: ["#1e88e5", "#64b5f6"] };
                const cc = cMap[row.status] || cMap.todo;
                g.addColorStop(0, cc[0]); g.addColorStop(1, cc[1]);

                    ctx.globalAlpha = blinkPhase.val;
                    ctx.strokeStyle = "#f44336"; ctx.lineWidth = 2; ctx.setLineDash([3, 2]); roundRect(bx - 1, by - 1, bw + 2, bh + 2, 4); ctx.stroke(); ctx.setLineDash([]);
                    ctx.font = "bold 10px -apple-system,sans-serif"; ctx.textAlign = "right"; ctx.fillStyle = "#f44336";
                    ctx.fillText("⚠️", bx + bw + 14, y + ROW_H / 2 + 4);
                    ctx.globalAlpha = 1;

                if (bw > 50) { ctx.fillStyle = "rgba(255,255,255,.85)"; ctx.font = "bold 8px -apple-system,sans-serif"; ctx.textAlign = "center"; ctx.fillText(row.start.slice(5) + " → " + row.end.slice(5), bx + bw / 2, by + bh / 2 + 3); ctx.textAlign = "left"; }

                rowRects.push({ x: bx, y: by, w: bw, h: bh, type: "bar", data: row });

    // Left separator

// ========== TOOLTIP ==========
const tooltip = document.getElementById("tooltip");
canvas.addEventListener("mousemove", function (e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left), my = (e.clientY - rect.top);
    let found = false;
    for (const r of rowRects) {
        if (r.type === "bar" && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
            const d = r.data;
            const daysLeft = Math.ceil((new Date(d.end) - TODAY) / 86400000);
            const dlText = daysLeft < 0 ? `<span style="color:#f44336">已逾期${-daysLeft}天</span>` : daysLeft === 0 ? `<span style="color:#ff6f00">今日截止</span>` : `剩余${daysLeft}天`;
            const statusMap = { done: "✅ 已完成", progress: "🔄 进行中", todo: "⏳ 未开始" };
            tooltip.innerHTML = `<div class="tt-title">${d.task || ""}</div>
                <div class="tt-row"><span class="tt-label">负责人</span>${d.owner || "未指定"}</div>
                <div class="tt-row"><span class="tt-label">优先级</span>${d.p || "-"}</div>
                <div class="tt-row"><span class="tt-label">时间</span>${d.start} → ${d.end}</div>
                <div class="tt-row"><span class="tt-label">状态</span>${statusMap[d.status] || d.status}</div>
                <div class="tt-row"><span class="tt-label">倒计时</span>${dlText}</div>`;
            tooltip.style.display = "block";
            tooltip.style.left = (e.clientX + 12) + "px";
            tooltip.style.top = (e.clientY - 80) + "px";
            found = true; break;
        }
    }
    if (!found) tooltip.style.display = "none";
});
canvas.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

// ========== PHASE CLICK (COLLAPSE) ==========
canvas.addEventListener("click", function (e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    for (const r of rowRects) {
        if (r.type === "phase" && mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
            collapsedPhases[r.phaseKey] = !collapsedPhases[r.phaseKey];
            render(); break;
        }
    }
});

    render();
}

// ========== TODAY TODO ==========
function getDaysLeft(endDate) { return Math.ceil((new Date(endDate).getTime() - todayMs) / 86400000); }
function collectTodayTodos() {
    const inProgress = [], startingToday = [], dueSoon = [];
    const projLabels = { nz: "🇳🇿新西兰", ybyh: "🇮🇹意波英荷", cl: "🇨🇱智利", il: "🇮🇱以色列" };
    for (const [k, proj] of Object.entries(PROJECTS)) {
        for (const t of proj.tasks) {
            if (t.status === "phase" || !t.start || !t.end || t.status === "done") continue;
            const startMs = new Date(t.start).getTime(), endMs = new Date(t.end).getTime();
            const item = { ...t, projLabel: projLabels[k], projColor: proj.color, daysLeft: getDaysLeft(t.end) };
            if (t.status === "progress") inProgress.push(item);
            else if (t.status === "todo" && startMs <= todayMs && endMs >= todayMs) startingToday.push(item);
            else if (t.status === "todo" && startMs > todayMs && startMs <= todayMs + 3 * 86400000) dueSoon.push(item);
        }
    }
    inProgress.sort((a, b) => a.daysLeft - b.daysLeft);
    startingToday.sort((a, b) => a.daysLeft - b.daysLeft);
    dueSoon.sort((a, b) => new Date(a.start) - new Date(b.start));
    return { inProgress, startingToday, dueSoon };
}
function renderTodoItem(item) {
    const uc = item.daysLeft <= 0 ? "urgent" : item.daysLeft <= 3 ? "warn" : "normal";
    const cc = item.daysLeft <= 0 ? "countdown-overdue" : item.daysLeft <= 3 ? "countdown-urgent" : "countdown-ok";
    const ct = item.daysLeft < 0 ? `已逾期${-item.daysLeft}天` : item.daysLeft === 0 ? "今日截止" : `剩余${item.daysLeft}天`;
    const pc = item.p ? `todo-${item.p.toLowerCase()}` : "";
    return `<div class="todo-item ${uc}"><span class="todo-proj" style="color:${item.projColor}">${item.projLabel}</span>
        ${item.p ? `<span class="todo-priority ${pc}">${item.p}</span>` : '<span style="min-width:20px"></span>'}
        <span class="todo-task">${item.task || ""}</span>
        <span class="todo-owner">${item.owner ? "👤 " + (item.owner.length > 6 ? item.owner.slice(0, 6) + ".." : item.owner) : ""}</span>
        <span class="todo-date">${item.start.slice(5)} → ${item.end.slice(5)}</span>
        <span class="todo-countdown ${cc}">${ct}</span></div>`;
}
function renderSection(title, bgColor, items) {
    if (!items.length) return "";
    return `<div class="todo-section"><div class="todo-section-header" style="background:${bgColor}">${title} <span class="count">${items.length}项</span></div><div class="todo-list">${items.map(renderTodoItem).join("")}</div></div>`;
}
function buildTodoPanel() {
    const { inProgress, startingToday, dueSoon } = collectTodayTodos();
    const total = inProgress.length + startingToday.length + dueSoon.length;
    const overdueCount = [...inProgress, ...startingToday].filter(i => i.daysLeft <= 0).length;
    const urgentCount = [...inProgress, ...startingToday].filter(i => i.daysLeft > 0 && i.daysLeft <= 3).length;
    document.getElementById("todoBadge").textContent = total;
    document.getElementById("todoSummary").innerHTML =
        `<div class="summary-card"><div class="num" style="color:#fb8c00">${inProgress.length}</div><div class="label">进行中</div></div>
         <div class="summary-card"><div class="num" style="color:#1e88e5">${startingToday.length}</div><div class="label">今日应启动</div></div>
         <div class="summary-card"><div class="num" style="color:#9c27b0">${dueSoon.length}</div><div class="label">3日内启动</div></div>
         <div class="summary-card"><div class="num" style="color:#f44336">${overdueCount}</div><div class="label">已逾期</div></div>
         <div class="summary-card"><div class="num" style="color:#ff6f00">${urgentCount}</div><div class="label">即将到期</div></div>`;
    let html = "";
    if (!total) html = `<div class="todo-section"><div class="todo-empty">🎉 今天没有待办任务！</div></div>`;
    else {
        html += renderSection("🔥 进行中 — 需持续跟进", "#fb8c00", inProgress);
        html += renderSection("📌 今日应启动 — 请尽快推进", "#1e88e5", startingToday);
        html += renderSection("📅 未来3天内启动 — 提前准备", "#7b1fa2", dueSoon);
    }
    document.getElementById("todoPanel").innerHTML = html;
}
let todoVisible = false;
function toggleTodo() {
    todoVisible = !todoVisible;
    document.getElementById("todoPanel").classList.toggle("show", todoVisible);
    document.getElementById("todoSummary").style.display = todoVisible ? "flex" : "none";
}

// ========== INIT ==========
renderCountdown();
renderProgressRings();
initOwnerFilter();
buildTodoPanel();

// ========== UPDATE PANEL ==========
let updateProjKey = "nz";

function toggleUpdatePanel() {
    const panel = document.getElementById("updatePanel");
    panel.classList.toggle("show");
    if (panel.classList.contains("show")) { buildUpdateProjTabs(); buildUpdateList(); }
}

function buildUpdateProjTabs() {
    let html = "";
    for (const [k, proj] of Object.entries(PROJECTS)) {
        const shortNames = { nz: "🇳🇿 新西兰", ybyh: "🇮🇹 意波英荷", cl: "🇨🇱 智利", il: "🇮🇱 以色列" };
        const active = k === updateProjKey ? " active" : "";
        html += `<div class="update-proj-tab${active}" onclick="switchUpdateProj('${k}', this)">${shortNames[k] || proj.name}</div>`;
    }
    document.getElementById("updateProjTabs").innerHTML = html;
}

function switchUpdateProj(key, el) {
    updateProjKey = key;
    document.querySelectorAll(".update-proj-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    buildUpdateList();
}

function buildUpdateList() {
    const proj = PROJECTS[updateProjKey];
    if (!proj) return;
    let html = "";
    proj.tasks.forEach((t, idx) => {
        if (t.status === "phase") {
            html += `<div class="update-phase">${t.phase}</div>`;
            return;
        }
        if (!t.task) return;
        const selectClass = t.status === "done" ? "s-done" : t.status === "progress" ? "s-progress" : "s-todo";
        html += `<div class="update-row">
            <span class="task-name">${t.task}</span>
            <span class="owner-tag">${t.owner ? "👤 " + (t.owner.length > 6 ? t.owner.slice(0,6)+".." : t.owner) : ""}</span>
            <span style="font-size:10px;color:#999">${t.p || ""}</span>
            <select class="status-select ${selectClass}" onchange="updateTaskStatus('${updateProjKey}', ${idx}, this.value, this)">
                <option value="todo" ${t.status==="todo"?"selected":""}>⏳ 未开始</option>
                <option value="progress" ${t.status==="progress"?"selected":""}>🔄 进行中</option>
                <option value="done" ${t.status==="done"?"selected":""}>✅ 已完成</option>
            </select>
        </div>`;
    });
    document.getElementById("updateList").innerHTML = html;
}

function updateTaskStatus(projKey, taskIdx, newStatus, selectEl) {
    PROJECTS[projKey].tasks[taskIdx].status = newStatus;
    selectEl.className = "status-select " + (newStatus === "done" ? "s-done" : newStatus === "progress" ? "s-progress" : "s-todo");
    renderProgressRings();
    buildTodoPanel();
    render();
    const hint = document.getElementById("saveHint");
    hint.classList.add("show");
    setTimeout(() => hint.classList.remove("show"), 1500);
    try { localStorage.setItem("gantt_data_" + projKey, JSON.stringify(PROJECTS[projKey].tasks.map(t => t.status))); } catch(e) {}
}

function loadSavedStatuses() {
    for (const [k, proj] of Object.entries(PROJECTS)) {
        try {
            const saved = JSON.parse(localStorage.getItem("gantt_data_" + k));
            if (saved && saved.length === proj.tasks.length) {
                proj.tasks.forEach((t, i) => { if (saved[i] && t.status !== "phase") t.status = saved[i]; });
            }
        } catch(e) {}
    }
}

loadSavedStatuses();

// ========== WEEKLY REPORT ==========
let reportText = "";
let reportMarkdown = "";

function toggleReport() {
    const panel = document.getElementById("reportPanel");
    const isShow = !panel.classList.contains("show");
    panel.classList.toggle("show", isShow);
    if (isShow) generateReport();
}

function generateReport() {
    const today = new Date(TODAY_STR);
    const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay() + 1);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    const fmt = d => `${d.getMonth()+1}月${d.getDate()}日`;
    const fmtFull = d => d.toISOString().slice(0,10);
    const weekLabel = `${fmt(weekStart)} - ${fmt(weekEnd)}`;

    const projNames = { nz: "🇳🇿 新西兰", ybyh: "🇮🇹🇵🇱🇬🇧🇳🇱 意波英荷", cl: "🇨🇱 智利", il: "🇮🇱 以色列" };
    let html = "";
    let plainText = `📊 海外开仓项目进展周报\n📅 ${weekLabel}（第${getWeekNumber(today)}周）\n${"═".repeat(36)}\n\n`;
    let markdown = `## 📊 海外开仓项目进展周报\n**📅 ${weekLabel}（第${getWeekNumber(today)}周）**\n\n---\n\n`;

    for (const [k, proj] of Object.entries(PROJECTS)) {
        const tasks = proj.tasks.filter(t => t.task && t.start && t.end);
        const done = tasks.filter(t => t.status === "done");
        const progress = tasks.filter(t => t.status === "progress");
        const todo = tasks.filter(t => t.status === "todo");
        const total = tasks.length;
        const pct = total ? Math.round(((done.length + progress.length * 0.5) / total) * 100) : 0;

        const riskTasks = tasks.filter(t => isRisk(t));
        const deadlineDays = Math.ceil((new Date(proj.deadline) - today) / 86400000);

        const thisWeekTasks = tasks.filter(t => {
            const s = new Date(t.start), e = new Date(t.end);
            return (s <= weekEnd && e >= weekStart);
        });
        const thisWeekDone = thisWeekTasks.filter(t => t.status === "done");
        const thisWeekProgress = thisWeekTasks.filter(t => t.status === "progress");
        const nextWeekStart = new Date(weekEnd); nextWeekStart.setDate(nextWeekStart.getDate() + 1);
        const nextWeekEnd = new Date(nextWeekStart); nextWeekEnd.setDate(nextWeekStart.getDate() + 6);
        const nextWeekTasks = tasks.filter(t => {
            const s = new Date(t.start);
            return s >= nextWeekStart && s <= nextWeekEnd && t.status !== "done";
        });

        // HTML
        html += `<div class="proj-block" style="border-left-color:${proj.color}">
            <h4 style="color:${proj.color};margin-top:0">${projNames[k] || proj.name}（距上线 ${deadlineDays} 天）</h4>
            <div class="stat-row">
                <span class="stat-item">📊 总进度 <b>${pct}%</b></span>
                <span class="stat-item">✅ 已完成 <b>${done.length}</b>/${total}</span>
                <span class="stat-item">🔄 进行中 <b>${progress.length}</b></span>
                <span class="stat-item">⏳ 未开始 <b>${todo.length}</b></span>
                ${riskTasks.length ? `<span class="stat-item" style="color:#f44336">⚠️ 风险 <b>${riskTasks.length}</b></span>` : ""}
            </div>`;

        if (thisWeekDone.length) {
            html += `<div style="margin-top:8px"><b>✅ 本周已完成：</b></div>`;
            thisWeekDone.forEach(t => { html += `<div style="padding-left:16px;font-size:12px">• ${t.task}${t.owner ? "（" + t.owner + "）" : ""}</div>`; });
        }
        if (thisWeekProgress.length) {
            html += `<div style="margin-top:6px"><b>🔄 本周进行中：</b></div>`;
            thisWeekProgress.forEach(t => {
                const dl = Math.ceil((new Date(t.end) - today) / 86400000);
                const warn = dl <= 3 ? ` ⚠️剩${dl}天` : "";
                html += `<div style="padding-left:16px;font-size:12px">• ${t.task}${t.owner ? "（" + t.owner + "）" : ""} [${t.start.slice(5)}→${t.end.slice(5)}]${warn}</div>`;
            });
        }
        if (riskTasks.length) {
            html += `<div style="margin-top:6px;color:#f44336"><b>⚠️ 风险项：</b></div>`;
            riskTasks.forEach(t => { html += `<div style="padding-left:16px;font-size:12px;color:#f44336">• ${t.task}${t.owner ? "（" + t.owner + "）" : ""} — 已逾期或即将到期</div>`; });
        }
        if (nextWeekTasks.length) {
            html += `<div style="margin-top:6px"><b>📅 下周计划：</b></div>`;
            nextWeekTasks.forEach(t => { html += `<div style="padding-left:16px;font-size:12px">• ${t.task}${t.owner ? "（" + t.owner + "）" : ""}</div>`; });
        }
        html += `</div>`;

        // Plain text
        plainText += `${"─".repeat(36)}\n`;
        plainText += `${projNames[k] || proj.name}（距上线 ${deadlineDays} 天）\n`;
        plainText += `📊 总进度 ${pct}% ｜ ✅完成${done.length}/${total} ｜ 🔄进行中${progress.length} ｜ ⏳未开始${todo.length}${riskTasks.length ? " ｜ ⚠️风险" + riskTasks.length : ""}\n\n`;
        if (thisWeekDone.length) { plainText += `✅ 本周已完成：\n`; thisWeekDone.forEach(t => { plainText += `  • ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); plainText += "\n"; }
        if (thisWeekProgress.length) { plainText += `🔄 本周进行中：\n`; thisWeekProgress.forEach(t => { const dl = Math.ceil((new Date(t.end)-today)/86400000); plainText += `  • ${t.task}${t.owner ? "（" + t.owner + "）" : ""}${dl <= 3 ? " ⚠️剩" + dl + "天" : ""}\n`; }); plainText += "\n"; }
        if (riskTasks.length) { plainText += `⚠️ 风险项：\n`; riskTasks.forEach(t => { plainText += `  • ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); plainText += "\n"; }
        if (nextWeekTasks.length) { plainText += `📅 下周计划：\n`; nextWeekTasks.forEach(t => { plainText += `  • ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); plainText += "\n"; }

        // Markdown
        markdown += `### ${projNames[k] || proj.name}（距上线 ${deadlineDays} 天）\n\n`;
        markdown += `| 指标 | 数值 |\n|------|------|\n`;
        markdown += `| 总进度 | **${pct}%** |\n| 已完成 | ${done.length}/${total} |\n| 进行中 | ${progress.length} |\n| 未开始 | ${todo.length} |\n`;
        if (riskTasks.length) markdown += `| ⚠️风险项 | ${riskTasks.length} |\n`;
        markdown += "\n";
        if (thisWeekDone.length) { markdown += `**✅ 本周已完成：**\n`; thisWeekDone.forEach(t => { markdown += `- ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); markdown += "\n"; }
        if (thisWeekProgress.length) { markdown += `**🔄 本周进行中：**\n`; thisWeekProgress.forEach(t => { const dl=Math.ceil((new Date(t.end)-today)/86400000); markdown += `- ${t.task}${t.owner ? "（" + t.owner + "）" : ""}${dl<=3?" ⚠️剩"+dl+"天":""}\n`; }); markdown += "\n"; }
        if (riskTasks.length) { markdown += `**⚠️ 风险项：**\n`; riskTasks.forEach(t => { markdown += `- ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); markdown += "\n"; }
        if (nextWeekTasks.length) { markdown += `**📅 下周计划：**\n`; nextWeekTasks.forEach(t => { markdown += `- ${t.task}${t.owner ? "（" + t.owner + "）" : ""}\n`; }); markdown += "\n"; }
        markdown += "---\n\n";
    }

    reportText = plainText;
    reportMarkdown = markdown;
    document.getElementById("reportContent").innerHTML = html;
}

function getWeekNumber(d) {
    const onejan = new Date(d.getFullYear(), 0, 1);
    return Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
}

function copyReport() {
    navigator.clipboard.writeText(reportText).then(() => showCopyToast());
}

function copyReportMarkdown() {
    navigator.clipboard.writeText(reportMarkdown).then(() => showCopyToast());
}

function showCopyToast() {
    const toast = document.getElementById("copyToast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
}

renderProgressRings();
buildTodoPanel();
render();
animateBlink();
</script>
