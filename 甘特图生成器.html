<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目甘特图生成器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;transition:background .3s,color .3s}
body.dark{background:#1a1a2e;color:#e0e0e0}

/* Landing */
.landing{max-width:900px;margin:0 auto;padding:40px 20px}
.landing-header{text-align:center;margin-bottom:32px}
.landing-header h2{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#1a73e8,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-header p{color:#666;font-size:14px}
.steps{display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.step-card{flex:1;min-width:200px;max-width:260px;background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.step-card .num{width:36px;height:36px;border-radius:50%;background:#1a73e8;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;margin-bottom:10px}
.step-card h4{font-size:14px;margin-bottom:6px}
.step-card p{font-size:12px;color:#888;line-height:1.5}

/* Template */
.template-section{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.template-section h3{font-size:16px;margin-bottom:12px;color:#1a73e8}
.template-btns{display:flex;gap:10px;flex-wrap:wrap}
.dl-btn{padding:10px 20px;border:2px solid #1a73e8;background:#fff;color:#1a73e8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.dl-btn:hover{background:#1a73e8;color:#fff}
.dl-btn.primary{background:#1a73e8;color:#fff}
.dl-btn.primary:hover{background:#0d47a1}

/* Upload */
.upload-section{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.upload-section h3{font-size:16px;margin-bottom:12px;color:#1a73e8}
.drop-zone{border:2px dashed #ccc;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.drop-zone:hover,.drop-zone.dragover{border-color:#1a73e8;background:#e8f0fe}
.drop-zone .icon{font-size:40px;margin-bottom:8px}
.drop-zone p{color:#888;font-size:13px}
.drop-zone input{display:none}
.file-info{margin-top:12px;padding:10px;background:#e8f5e9;border-radius:8px;font-size:12px;color:#2e7d32;display:none}

/* JSON Editor */
.json-section{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.json-section h3{font-size:16px;margin-bottom:12px;color:#1a73e8}
.json-editor{width:100%;height:300px;border:1px solid #ddd;border-radius:8px;padding:12px;font-family:'SF Mono',Consolas,monospace;font-size:12px;resize:vertical;outline:none;background:#fafbfc}
.json-editor:focus{border-color:#1a73e8}
.json-error{color:#f44336;font-size:12px;margin-top:6px;display:none}
.gen-btn{margin-top:12px;padding:12px 32px;background:linear-gradient(135deg,#1a73e8,#7c4dff);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;transition:all .2s;box-shadow:0 3px 10px rgba(26,115,232,.3)}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(26,115,232,.4)}

/* Gantt page */
.gantt-page{display:none;padding:16px}
.back-btn{padding:8px 18px;border:2px solid #1a73e8;background:#fff;color:#1a73e8;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:12px;transition:all .2s}
.back-btn:hover{background:#1a73e8;color:#fff}
.g-header{text-align:center;background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 12px rgba(26,115,232,.3);margin-bottom:12px}
.g-header h2{font-size:22px;margin-bottom:4px}
.g-header p{font-size:13px;opacity:.85}
.countdown-bar{display:flex;justify-content:center;gap:24px;margin-top:10px;flex-wrap:wrap}
.countdown-item{background:rgba(255,255,255,.15);padding:6px 16px;border-radius:16px;font-size:12px;font-weight:600}
.countdown-item .days{font-size:18px;font-weight:800;margin:0 4px}
.progress-rings{display:flex;justify-content:center;gap:16px;margin:12px 0;flex-wrap:wrap}
.ring-card{background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;min-width:180px}
body.dark .ring-card{background:#16213e}
.ring-svg{width:52px;height:52px}
.ring-label{font-size:12px;font-weight:700}
.ring-stats{font-size:10px;color:#888;margin-top:2px}
.toolbar{display:flex;justify-content:center;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center}
.tab-btn{padding:7px 16px;border:2px solid #1a73e8;background:#fff;color:#1a73e8;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.tab-btn:hover,.tab-btn.active{background:#1a73e8;color:#fff}
body.dark .tab-btn{background:#16213e;border-color:#3b82f6;color:#93c5fd}
body.dark .tab-btn.active{background:#3b82f6;color:#fff}
.filter-select{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;outline:none}
body.dark .filter-select{background:#16213e;border-color:#444;color:#e0e0e0}
.search-box{padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;width:140px;outline:none}
.search-box:focus{border-color:#1a73e8}
body.dark .search-box{background:#16213e;border-color:#444;color:#e0e0e0}
.icon-btn{padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;transition:all .2s}
.icon-btn:hover{background:#f0f4ff;border-color:#1a73e8}
.icon-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
body.dark .icon-btn{background:#16213e;border-color:#444;color:#e0e0e0}
.sep{width:1px;height:20px;background:#ddd;margin:0 2px}
body.dark .sep{background:#444}
.legend{display:flex;justify-content:center;gap:14px;margin:6px 0 8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
body.dark .legend-item{color:#aaa}
.legend-color{width:12px;height:12px;border-radius:3px}
.todo-toggle{display:flex;justify-content:center;margin:0 0 8px}
.todo-toggle-btn{padding:9px 24px;border:none;background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;border-radius:24px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:0 3px 10px rgba(255,111,0,.3)}
.todo-toggle-btn .badge{display:inline-block;background:#fff;color:#ff6f00;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px}
.todo-panel{margin:0 0 12px;display:none}
.todo-panel.show{display:block}
.todo-section{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
body.dark .todo-section{background:#16213e}
.todo-section-header{padding:10px 16px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.todo-section-header .count{background:rgba(255,255,255,.3);padding:1px 7px;border-radius:10px;font-size:10px}
.todo-list{padding:4px 10px 10px}
.todo-item{display:flex;align-items:center;padding:7px 10px;margin:3px 0;border-radius:6px;background:#fafbfc;border-left:4px solid #ccc;font-size:11px;gap:8px}
body.dark .todo-item{background:#1a1a3e}
.todo-item.urgent{border-left-color:#f44336;background:#fff5f5}
.todo-item.warn{border-left-color:#ff9800}
.todo-item.normal{border-left-color:#1e88e5}
.todo-proj{font-weight:700;min-width:56px;font-size:10px}
.todo-task{flex:1;font-weight:500}
.todo-owner{color:#666;min-width:60px;font-size:10px}
.todo-date{color:#999;font-size:10px;min-width:85px;text-align:right}
.todo-priority{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;min-width:20px;text-align:center}
.todo-p0{background:#fce4ec;color:#c62828}.todo-p1{background:#fff3e0;color:#e65100}.todo-p2{background:#e8f5e9;color:#2e7d32}
.todo-countdown{font-size:10px;font-weight:700;min-width:50px;text-align:center}
.countdown-overdue{color:#f44336}.countdown-urgent{color:#ff6f00}.countdown-ok{color:#43a047}
.todo-summary{display:flex;gap:12px;justify-content:center;margin:0 0 8px;flex-wrap:wrap}
.summary-card{background:#fff;border-radius:10px;padding:10px 16px;box-shadow:0 2px 6px rgba(0,0,0,.06);text-align:center;min-width:100px}
body.dark .summary-card{background:#16213e}
.summary-card .num{font-size:24px;font-weight:800}
.summary-card .label{font-size:10px;color:#888;margin-top:1px}
.gantt-wrapper{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow-x:auto;position:relative}
body.dark .gantt-wrapper{background:#16213e}
canvas{display:block}
.gantt-tooltip{display:none;position:fixed;background:rgba(0,0,0,.92);color:#fff;padding:12px 16px;border-radius:8px;font-size:12px;z-index:999;pointer-events:none;max-width:320px;line-height:1.7;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.gantt-tooltip .tt-title{font-weight:700;font-size:13px;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:4px}
</style>
</head>
<body>

<!-- ===== LANDING PAGE ===== -->
<div class="landing" id="landingPage">
    <div class="landing-header">
        <h2>📊 项目甘特图生成器</h2>
        <p>上传项目管理数据，一键生成专业甘特图 — 支持 Excel / JSON</p>
    </div>
    <div class="steps">
        <div class="step-card"><div class="num">1</div><h4>下载模板</h4><p>下载 Excel 或 JSON 模板，按格式填入你的项目数据</p></div>
        <div class="step-card"><div class="num">2</div><h4>上传数据</h4><p>将填好的文件拖拽到上传区域，或直接粘贴 JSON</p></div>
        <div class="step-card"><div class="num">3</div><h4>生成甘特图</h4><p>自动生成含进度环形图、风险预警、筛选等功能的甘特图</p></div>
    </div>

    <div class="template-section">
        <h3>📥 第一步：下载模板</h3>
        <div class="template-btns">
            <button class="dl-btn primary" onclick="downloadExcelTemplate()">📄 下载 Excel 模板</button>
            <button class="dl-btn" onclick="downloadJsonTemplate()">📋 下载 JSON 模板</button>
            <button class="dl-btn" onclick="loadDemoData()">🎯 加载示例数据</button>
        </div>
    </div>

    <div class="upload-section">
        <h3>📤 第二步：上传数据文件</h3>
        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <p>拖拽 Excel(.xlsx) 或 JSON(.json) 文件到此处<br>或 <strong>点击选择文件</strong></p>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.json,.csv">
        </div>
        <div class="file-info" id="fileInfo"></div>
    </div>

    <div class="json-section">
        <h3>✏️ 或直接编辑 JSON 数据</h3>
        <textarea class="json-editor" id="jsonEditor" placeholder="在此粘贴或编辑 JSON 数据..."></textarea>
        <div class="json-error" id="jsonError"></div>
        <button class="gen-btn" onclick="generateFromEditor()">🚀 生成甘特图</button>
    </div>
</div>

<!-- ===== GANTT PAGE ===== -->
<div class="gantt-page" id="ganttPage">
    <button class="back-btn" onclick="goBack()">← 返回编辑数据</button>
    <div class="g-header" id="gHeader"></div>
    <div class="progress-rings" id="progressRings"></div>
    <div class="toolbar" id="toolbarArea"></div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#43a047"></div>已完成</div>
        <div class="legend-item"><div class="legend-color" style="background:#fb8c00"></div>进行中</div>
        <div class="legend-item"><div class="legend-color" style="background:#1e88e5"></div>未开始</div>
        <div class="legend-item"><div class="legend-color" style="background:#5e35b1"></div>阶段汇总</div>
        <div class="legend-item"><div class="legend-color" style="background:#f44336;width:3px;height:14px"></div>今日</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff6f00;width:3px;height:14px"></div>里程碑</div>
        <div class="legend-item"><div class="legend-color" style="background:transparent;border:2px dashed #f44336;width:12px;height:12px"></div>风险⚠️</div>
    </div>
    <div class="todo-toggle" id="todoToggleWrap"><button class="todo-toggle-btn" onclick="toggleTodo()">📋 今日待办提醒 <span class="badge" id="todoBadge">0</span></button></div>
    <div class="todo-summary" id="todoSummary" style="display:none"></div>
    <div class="todo-panel" id="todoPanel"></div>
    <div class="gantt-wrapper"><canvas id="ganttCanvas"></canvas></div>
    <div class="gantt-tooltip" id="tooltip"></div>
</div>

<script>
// ========== TEMPLATE DATA ==========
const TEMPLATE_JSON = {
  title: "我的项目甘特图",
  today: new Date().toISOString().slice(0,10),
  projects: [
    {
      key: "proj1",
      name: "📦 项目一",
      color: "#1a73e8",
      deadline: "2026-07-30",
      deadlineLabel: "730",
      tasks: [
        { phase: "1. 需求阶段", start: "2026-05-01", end: "2026-06-15" },
        { task: "需求调研", priority: "P0", owner: "张三", start: "2026-05-01", end: "2026-05-15", status: "done" },
        { task: "需求评审", priority: "P0", owner: "李四", start: "2026-05-15", end: "2026-05-25", status: "progress" },
        { task: "方案设计", priority: "P1", owner: "王五", start: "2026-05-25", end: "2026-06-10", status: "todo" },
        { phase: "2. 开发阶段", start: "2026-06-01", end: "2026-07-15" },
        { task: "前端开发", priority: "P1", owner: "赵六", start: "2026-06-01", end: "2026-06-25", status: "todo" },
        { task: "后端开发", priority: "P1", owner: "钱七", start: "2026-06-05", end: "2026-06-28", status: "todo" },
        { task: "联调测试", priority: "P2", owner: "孙八", start: "2026-06-28", end: "2026-07-10", status: "todo" },
        { phase: "3. 上线阶段", start: "2026-07-10", end: "2026-07-30" },
        { task: "UAT测试", priority: "P2", owner: "周九", start: "2026-07-10", end: "2026-07-18", status: "todo" },
        { task: "正式发布", priority: "P0", owner: "张三", start: "2026-07-18", end: "2026-07-25", status: "todo" },
        { task: "灰度放量", priority: "P2", owner: "张三", start: "2026-07-25", end: "2026-07-30", status: "todo" }
      ]
    }
  ]
};

// ========== DOWNLOAD TEMPLATES ==========
function downloadJsonTemplate() {
    const blob = new Blob([JSON.stringify(TEMPLATE_JSON, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "甘特图数据模板.json"; a.click();
}

function downloadExcelTemplate() {
    const wsData = [
        ["[项目配置]","","","","","",""],
        ["项目key","项目名称","主题色","截止日期","截止标签","",""],
        ["proj1","📦 项目一","#1a73e8","2026-07-30","730","",""],
        ["","","","","","",""],
        ["[任务数据] 项目key: proj1","","","","","",""],
        ["类型","名称","优先级","负责人","开始日期","结束日期","状态"],
        ["phase","1. 需求阶段","","","2026-05-01","2026-06-15",""],
        ["task","需求调研","P0","张三","2026-05-01","2026-05-15","done"],
        ["task","需求评审","P0","李四","2026-05-15","2026-05-25","progress"],
        ["task","方案设计","P1","王五","2026-05-25","2026-06-10","todo"],
        ["phase","2. 开发阶段","","","2026-06-01","2026-07-15",""],
        ["task","前端开发","P1","赵六","2026-06-01","2026-06-25","todo"],
        ["task","后端开发","P1","钱七","2026-06-05","2026-06-28","todo"],
        ["task","联调测试","P2","孙八","2026-06-28","2026-07-10","todo"],
        ["phase","3. 上线阶段","","","2026-07-10","2026-07-30",""],
        ["task","UAT测试","P2","周九","2026-07-10","2026-07-18","todo"],
        ["task","正式发布","P0","张三","2026-07-18","2026-07-25","todo"],
        ["task","灰度放量","P2","张三","2026-07-25","2026-07-30","todo"],
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:15},{wch:20},{wch:8},{wch:12},{wch:12},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, "甘特图数据");
    XLSX.writeFile(wb, "甘特图数据模板.xlsx");
}

function loadDemoData() {
    document.getElementById("jsonEditor").value = JSON.stringify(TEMPLATE_JSON, null, 2);
    document.getElementById("jsonError").style.display = "none";
}

// ========== FILE UPLOAD ==========
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener("change", e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
    const info = document.getElementById("fileInfo");
    info.style.display = "block";
    info.textContent = `✅ 已选择: ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "json") {
        const reader = new FileReader();
        reader.onload = e => { document.getElementById("jsonEditor").value = e.target.result; };
        reader.readAsText(file);
    } else if (ext === "xlsx" || ext === "xls") {
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: "array" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
            const parsed = parseExcelData(rows);
            document.getElementById("jsonEditor").value = JSON.stringify(parsed, null, 2);
        };
        reader.readAsArrayBuffer(file);
    }
}

function parseExcelData(rows) {
    const result = { title: "项目甘特图", today: new Date().toISOString().slice(0,10), projects: [] };
    let currentProjKey = null;
    let currentProj = null;
    let inConfig = false, inTasks = false;
    for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[0]) continue;
        const cell0 = String(row[0]).trim();
        if (cell0 === "[项目配置]") { inConfig = true; inTasks = false; continue; }
        if (cell0.startsWith("[任务数据]")) {
            inConfig = false; inTasks = true;
            const match = cell0.match(/项目key:\s*(\S+)/);
            currentProjKey = match ? match[1] : "proj" + (result.projects.length + 1);
            currentProj = result.projects.find(p => p.key === currentProjKey);
            if (!currentProj) { currentProj = { key: currentProjKey, name: currentProjKey, color: "#1a73e8", deadline: "", deadlineLabel: "", tasks: [] }; result.projects.push(currentProj); }
            continue;
        }
        if (inConfig && cell0 !== "项目key") {
            const proj = { key: cell0, name: String(row[1] || cell0), color: String(row[2] || "#1a73e8"), deadline: String(row[3] || ""), deadlineLabel: String(row[4] || ""), tasks: [] };
            result.projects.push(proj);
            continue;
        }
        if (inTasks && currentProj && cell0 !== "类型") {
            const type = cell0;
            if (type === "phase") {
                currentProj.tasks.push({ phase: String(row[1] || ""), start: String(row[4] || ""), end: String(row[5] || "") });
            } else if (type === "task") {
                currentProj.tasks.push({ task: String(row[1] || ""), priority: String(row[2] || ""), owner: String(row[3] || ""), start: String(row[4] || ""), end: String(row[5] || ""), status: String(row[6] || "todo") });
            }
        }
    }
    return result;
}

// ========== GENERATE ==========
function generateFromEditor() {
    const errEl = document.getElementById("jsonError");
    const raw = document.getElementById("jsonEditor").value.trim();

// ========== GANTT ENGINE ==========
let PROJECTS = {};
let ALL_MILESTONES = [];
let TIME_START, TIME_END, TODAY_STR, TODAY, todayMs;
let currentProject = "all", filterOwner = "", filterPriority = "", searchText = "", showCriticalPath = false, isDark = false;
let collapsedPhases = {}, todoVisible = false;
const ROW_H = 32, HDR_H = 48, LEFT_W = 440, DAY_W = 10;
let totalDays, CHART_W, FULL_W, canvas, ctx, dpr, rowRects = [], blinkPhase = { val: 1 }, animId = 0;

function buildGantt(data) {
    document.getElementById("landingPage").style.display = "none";
    document.getElementById("ganttPage").style.display = "block";
    canvas = document.getElementById("ganttCanvas");
    ctx = canvas.getContext("2d");
    dpr = window.devicePixelRatio || 1;
    TODAY_STR = data.today || new Date().toISOString().slice(0,10);
    TODAY = new Date(TODAY_STR);
    todayMs = TODAY.getTime();
    PROJECTS = {};
    ALL_MILESTONES = [];
    const defaultColors = ["#1a73e8","#e65100","#2e7d32","#6a1b9a","#c62828","#00838f","#4e342e","#1565c0"];
    let minDate = Infinity, maxDate = -Infinity;
    data.projects.forEach((proj, idx) => {
        const key = proj.key || ("proj" + (idx + 1));
        const color = proj.color || defaultColors[idx % defaultColors.length];
        const tasks = proj.tasks.map(t => {
            if (t.phase) return { phase: t.phase, start: t.start, end: t.end, status: "phase" };
            return { task: t.task, p: t.priority || "", owner: t.owner || "", start: t.start, end: t.end, status: t.status || "todo" };
        });
        tasks.forEach(t => {
            if (t.start) { const d = new Date(t.start).getTime(); if (d < minDate) minDate = d; }
            if (t.end) { const d = new Date(t.end).getTime(); if (d > maxDate) maxDate = d; }
        });
        PROJECTS[key] = { name: proj.name || key, color, deadline: proj.deadline || "", deadlineLabel: proj.deadlineLabel || "", tasks };
        if (proj.deadline) {
            const existing = ALL_MILESTONES.find(m => m.date === proj.deadline);
            if (existing) { existing.projects.push(key); }
            else { ALL_MILESTONES.push({ date: proj.deadline, label: (proj.deadlineLabel || proj.deadline.slice(5)) + "上线", color: idx === 0 ? "#ff6f00" : "#d32f2f", projects: [key] }); }
        }
    });
    TIME_START = new Date(minDate - 10 * 86400000);
    TIME_END = new Date(maxDate + 10 * 86400000);
    totalDays = Math.ceil((TIME_END - TIME_START) / 86400000);
    CHART_W = totalDays * DAY_W;
    FULL_W = LEFT_W + CHART_W + 10;
    currentProject = "all"; filterOwner = ""; filterPriority = ""; searchText = ""; showCriticalPath = false; collapsedPhases = {}; todoVisible = false;
    buildHeader(data);
    renderProgressRings();
    buildToolbar();
    buildTodoPanel();
    render();

}

function buildHeader(data) {
    const title = data.title || "项目甘特图";
    const projNames = Object.values(PROJECTS).map(p => p.name + (p.deadlineLabel ? "(" + p.deadlineLabel + "上线)" : "")).join(" ｜ ");
    let cdHtml = "";
    ALL_MILESTONES.forEach(m => {
        const d = Math.ceil((new Date(m.date) - TODAY) / 86400000);
        cdHtml += `<div class="countdown-item">距${m.label} <span class="days">${d}</span> 天</div>`;
    });
    document.getElementById("gHeader").innerHTML = `<h2>${title}</h2><p>${projNames}</p><div class="countdown-bar">${cdHtml}</div>`;
}

function renderProgressRings() {
    let html = "";
    for (const [k, proj] of Object.entries(PROJECTS)) {
        const tasks = proj.tasks.filter(t => t.task && t.start && t.end);
        const done = tasks.filter(t => t.status === "done").length;
        const prog = tasks.filter(t => t.status === "progress").length;
        const todo = tasks.filter(t => t.status === "todo").length;
        const total = tasks.length || 1;
        const pct = Math.round(((done + prog * 0.5) / total) * 100);
        const r = 20, c = 2 * Math.PI * r;
        const doneArc = (done / total) * c, progArc = (prog / total) * c;
        html += `<div class="ring-card"><svg class="ring-svg" viewBox="0 0 52 52"><circle cx="26" cy="26" r="${r}" fill="none" stroke="#e0e0e0" stroke-width="5"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="#43a047" stroke-width="5" stroke-dasharray="${doneArc} ${c-doneArc}" stroke-dashoffset="0" transform="rotate(-90 26 26)"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="#fb8c00" stroke-width="5" stroke-dasharray="${progArc} ${c-progArc}" stroke-dashoffset="${-doneArc}" transform="rotate(-90 26 26)"/><text x="26" y="29" text-anchor="middle" font-size="11" font-weight="800" fill="${proj.color}">${pct}%</text></svg><div><div class="ring-label" style="color:${proj.color}">${proj.name}</div><div class="ring-stats">✅${done} 🔄${prog} ⏳${todo} / ${total}项</div></div></div>`;
    }
    document.getElementById("progressRings").innerHTML = html;
}

function buildToolbar() {
    const keys = Object.keys(PROJECTS);
    let html = `<button class="tab-btn active" onclick="switchProject('all',this)">📊 全部项目</button>`;
    keys.forEach(k => { html += `<button class="tab-btn" onclick="switchProject('${k}',this)">${PROJECTS[k].name}</button>`; });
    html += `<span class="sep"></span>`;
    const owners = new Set();
    Object.values(PROJECTS).forEach(p => p.tasks.forEach(t => { if (t.owner) t.owner.split("/").forEach(o => { const n = o.trim().replace(/\(.*\)/,""); if(n) owners.add(n); }); }));
    html += `<select class="filter-select" id="filterOwner" onchange="applyFilters()"><option value="">👤 全部负责人</option>`;
    [...owners].sort().forEach(o => { html += `<option value="${o}">${o}</option>`; });
    html += `</select>`;
    html += `<select class="filter-select" id="filterPriority" onchange="applyFilters()"><option value="">🏷️ 全部优先级</option><option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option></select>`;
    html += `<input class="search-box" id="searchBox" placeholder="🔍 搜索..." oninput="applyFilters()">`;
    html += `<span class="sep"></span>`;
    html += `<button class="icon-btn" id="cpBtn" onclick="toggleCriticalPath()">🔴 关键路径</button>`;
    html += `<button class="icon-btn" onclick="exportPNG()">📥 导出</button>`;

}

function applyFilters() {
    filterOwner = document.getElementById("filterOwner").value;
    filterPriority = document.getElementById("filterPriority").value;
    searchText = document.getElementById("searchBox").value.trim().toLowerCase();
    render();
}
function matchesFilter(t) {
    if (t.status === "phase" || t.projHeader) return true;
    if (filterOwner && !(t.owner||"").includes(filterOwner)) return false;
    if (filterPriority && t.p !== filterPriority) return false;
    if (searchText && !(t.task||"").toLowerCase().includes(searchText) && !(t.owner||"").toLowerCase().includes(searchText)) return false;

}

function exportPNG() { const a = document.createElement("a"); a.download = "甘特图.png"; a.href = canvas.toDataURL("image/png"); a.click(); }

}

function getRows(projKey) {
    let rows = [];
    const addProj = (k, proj) => {
        rows.push({ projHeader: true, name: proj.name, color: proj.color, deadline: (proj.deadlineLabel||"") + "上线" });

function getDaysLeft(ed){return Math.ceil((new Date(ed).getTime()-todayMs)/86400000);}
function collectTodayTodos(){

}
function renderTodoItem(item){const uc=item.daysLeft<=0?"urgent":item.daysLeft<=3?"warn":"normal";const cc=item.daysLeft<=0?"countdown-overdue":item.daysLeft<=3?"countdown-urgent":"countdown-ok";const ct=item.daysLeft<0?`已逾期${-item.daysLeft}天`:item.daysLeft===0?"今日截止":`剩余${item.daysLeft}天`;const pc=item.p?`todo-${item.p.toLowerCase()}`:"";return`<div class="todo-item ${uc}"><span class="todo-proj" style="color:${item.projColor}">${item.projLabel}</span>${item.p?`<span class="todo-priority ${pc}">${item.p}</span>`:'<span style="min-width:20px"></span>'}<span class="todo-task">${item.task||""}</span><span class="todo-owner">${item.owner?"👤 "+(item.owner.length>6?item.owner.slice(0,6)+"..":item.owner):""}</span><span class="todo-date">${item.start.slice(5)} → ${item.end.slice(5)}</span><span class="todo-countdown ${cc}">${ct}</span></div>`;}
function renderSection(title,bg,items){if(!items.length)return"";return`<div class="todo-section"><div class="todo-section-header" style="background:${bg}">${title} <span class="count">${items.length}项</span></div><div class="todo-list">${items.map(renderTodoItem).join("")}</div></div>`;}
function buildTodoPanel(){
    const{inProgress,startingToday,dueSoon}=collectTodayTodos();const total=inProgress.length+startingToday.length+dueSoon.length;
    document.getElementById("todoBadge").textContent=total;
    const od=[...inProgress,...startingToday].filter(i=>i.daysLeft<=0).length;const ug=[...inProgress,...startingToday].filter(i=>i.daysLeft>0&&i.daysLeft<=3).length;
    document.getElementById("todoSummary").innerHTML=`<div class="summary-card"><div class="num" style="color:#fb8c00">${inProgress.length}</div><div class="label">进行中</div></div><div class="summary-card"><div class="num" style="color:#1e88e5">${startingToday.length}</div><div class="label">今日应启动</div></div><div class="summary-card"><div class="num" style="color:#9c27b0">${dueSoon.length}</div><div class="label">3日内启动</div></div><div class="summary-card"><div class="num" style="color:#f44336">${od}</div><div class="label">已逾期</div></div><div class="summary-card"><div class="num" style="color:#ff6f00">${ug}</div><div class="label">即将到期</div></div>`;
    let h="";if(!total)h=`<div class="todo-section"><div style="padding:16px;text-align:center;color:#aaa">🎉 今天没有待办任务！</div></div>`;
    else{h+=renderSection("🔥 进行中","#fb8c00",inProgress);h+=renderSection("📌 今日应启动","#1e88e5",startingToday);h+=renderSection("📅 未来3天内启动","#7b1fa2",dueSoon);}
    document.getElementById("todoPanel").innerHTML=h;
}
function toggleTodo(){todoVisible=!todoVisible;document.getElementById("todoPanel").classList.toggle("show",todoVisible);document.getElementById("todoSummary").style.display=todoVisible?"flex":"none";}
function goBack(){document.getElementById("ganttPage").style.display="none";document.getElementById("landingPage").style.display="block";}
</script>
